name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Build prebuilt binaries for all platforms and publish a GitHub Release
  # ---------------------------------------------------------------------------
  build-and-release:
    name: Build & publish release
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha_darwin_arm64: ${{ steps.checksums.outputs.sha_darwin_arm64 }}
      sha_darwin_amd64: ${{ steps.checksums.outputs.sha_darwin_amd64 }}
      sha_linux_amd64: ${{ steps.checksums.outputs.sha_linux_amd64 }}

    steps:
      - name: Checkout CLI repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Strip the leading 'v' from the tag (v2.1.0 → 2.1.0)
      - name: Extract version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Build one binary per platform with explicit output names so we
      # can reliably tar them as 'micropage' inside each archive.
      - name: Build binaries
        run: |
          mkdir -p dist
          npx @yao-pkg/pkg . --target node18-linux-x64   --output dist/micropage-linux-amd64
          npx @yao-pkg/pkg . --target node18-macos-x64   --output dist/micropage-darwin-amd64
          npx @yao-pkg/pkg . --target node18-macos-arm64 --output dist/micropage-darwin-arm64

      # Each tarball contains a single executable named 'micropage' so that
      # the Homebrew formula can do: bin.install "micropage"
      - name: Package tarballs
        working-directory: dist
        run: |
          cp micropage-linux-amd64  micropage && tar -czf micropage-linux-amd64.tar.gz  micropage && rm micropage
          cp micropage-darwin-amd64  micropage && tar -czf micropage-darwin-amd64.tar.gz  micropage && rm micropage
          cp micropage-darwin-arm64  micropage && tar -czf micropage-darwin-arm64.tar.gz  micropage && rm micropage

      - name: Compute SHA256 checksums
        id: checksums
        working-directory: dist
        run: |
          echo "sha_linux_amd64=$(sha256sum  micropage-linux-amd64.tar.gz  | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "sha_darwin_amd64=$(sha256sum micropage-darwin-amd64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "sha_darwin_arm64=$(sha256sum micropage-darwin-arm64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.meta.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/micropage-linux-amd64.tar.gz
            dist/micropage-darwin-amd64.tar.gz
            dist/micropage-darwin-arm64.tar.gz

  # ---------------------------------------------------------------------------
  # Update the Homebrew tap formula with the new version and SHA256 values
  # ---------------------------------------------------------------------------
  update-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: build-and-release

    steps:
      # Check out the tap repo using a PAT stored as TAP_GITHUB_TOKEN.
      # The PAT needs 'contents: write' access on the micropage-sh/homebrew-tap repo.
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: micropage-sh/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      # Check out the CLI repo to access the update script
      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          path: cli

      - name: Update formula
        env:
          RELEASE_VERSION: ${{ needs.build-and-release.outputs.version }}
          SHA_DARWIN_ARM64: ${{ needs.build-and-release.outputs.sha_darwin_arm64 }}
          SHA_DARWIN_AMD64: ${{ needs.build-and-release.outputs.sha_darwin_amd64 }}
          SHA_LINUX_AMD64: ${{ needs.build-and-release.outputs.sha_linux_amd64 }}
        run: |
          node cli/scripts/update-tap-formula.js homebrew-tap/Formula/micropage.rb

      - name: Commit and push formula update
        working-directory: homebrew-tap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/micropage.rb
          git commit -m "chore: bump micropage to v${{ needs.build-and-release.outputs.version }}"
          git push
