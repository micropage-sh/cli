name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Linux: build and checksum (cross-compile from Linux)
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build Linux binary
    runs-on: ubuntu-latest
    outputs:
      sha_linux_amd64: ${{ steps.checksums.outputs.sha_linux_amd64 }}
    steps:
      - name: Checkout CLI repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Linux binary
        run: |
          mkdir -p dist
          npx @yao-pkg/pkg . --target node18-linux-x64 --output dist/micropage-linux-amd64

      - name: Package tarball
        working-directory: dist
        run: |
          cp micropage-linux-amd64 micropage && tar -czf micropage-linux-amd64.tar.gz micropage && rm micropage

      - name: Compute SHA256 checksum
        id: checksums
        working-directory: dist
        run: |
          echo "sha_linux_amd64=$(sha256sum micropage-linux-amd64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Upload Linux tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: dist/micropage-linux-amd64.tar.gz

  # ---------------------------------------------------------------------------
  # macOS: build, Developer ID sign, and notarize (must run on macOS)
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build, sign, and notarize macOS binaries
    runs-on: macos-latest
    outputs:
      sha_darwin_amd64: ${{ steps.checksums.outputs.sha_darwin_amd64 }}
      sha_darwin_arm64: ${{ steps.checksums.outputs.sha_darwin_arm64 }}
    steps:
      - name: Checkout CLI repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build macOS binaries
        run: |
          mkdir -p dist
          npx @yao-pkg/pkg . --target node18-macos-x64 --output dist/micropage-darwin-amd64
          npx @yao-pkg/pkg . --target node18-macos-arm64 --output dist/micropage-darwin-arm64

      - name: Import code signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "actions" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 1200 -u -t 3600 "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "actions" "$KEYCHAIN_PATH"
          printf %s "$APPLE_CERTIFICATE" | base64 -D -o "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "actions" "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/certificate.p12"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign, notarize, and staple macOS binaries
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          CODESIGN_IDENTITY="$(
            security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | sed -E 's/.*"([^"]+)".*/\1/'
          )"
          if [ -z "$CODESIGN_IDENTITY" ]; then
            echo "No Developer ID Application identity found in keychain" >&2
            exit 1
          fi
          notarize_binary() {
            local f="$1"
            codesign --sign "$CODESIGN_IDENTITY" --options runtime --timestamp --force "$f"
            (cd dist && zip -q "$(basename "$f").notarize.zip" "$(basename "$f")")
            xcrun notarytool submit "dist/$(basename "$f").notarize.zip" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            rm -f "dist/$(basename "$f").notarize.zip"
            # Notarization is complete; stapling a bare Mach-O can fail on some toolchains—Gatekeeper still validates online
            xcrun stapler staple "$f" || true
          }
          notarize_binary dist/micropage-darwin-amd64
          notarize_binary dist/micropage-darwin-arm64

      - name: Package tarballs
        working-directory: dist
        run: |
          cp micropage-darwin-amd64 micropage && tar -czf micropage-darwin-amd64.tar.gz micropage && rm micropage
          cp micropage-darwin-arm64 micropage && tar -czf micropage-darwin-arm64.tar.gz micropage && rm micropage

      - name: Compute SHA256 checksums
        id: checksums
        working-directory: dist
        run: |
          echo "sha_darwin_amd64=$(shasum -a 256 micropage-darwin-amd64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "sha_darwin_arm64=$(shasum -a 256 micropage-darwin-arm64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Upload macOS tarballs
        uses: actions/upload-artifact@v4
        with:
          name: macos-tarballs
          path: |
            dist/micropage-darwin-amd64.tar.gz
            dist/micropage-darwin-arm64.tar.gz

  # ---------------------------------------------------------------------------
  # Assemble release assets and publish GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha_darwin_arm64: ${{ needs.build-macos.outputs.sha_darwin_arm64 }}
      sha_darwin_amd64: ${{ needs.build-macos.outputs.sha_darwin_amd64 }}
      sha_linux_amd64: ${{ needs.build-linux.outputs.sha_linux_amd64 }}
    steps:
      - name: Checkout CLI repo
        uses: actions/checkout@v4

      - name: Extract version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download Linux tarball
        uses: actions/download-artifact@v4
        with:
          name: linux-tarball
          path: dist

      - name: Download macOS tarballs
        uses: actions/download-artifact@v4
        with:
          name: macos-tarballs
          path: dist

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.meta.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/micropage-linux-amd64.tar.gz
            dist/micropage-darwin-amd64.tar.gz
            dist/micropage-darwin-arm64.tar.gz

  # ---------------------------------------------------------------------------
  # Update the Homebrew tap formula with the new version and SHA256 values
  # ---------------------------------------------------------------------------
  update-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: micropage-sh/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          path: cli

      - name: Update formula
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
          SHA_DARWIN_ARM64: ${{ needs.release.outputs.sha_darwin_arm64 }}
          SHA_DARWIN_AMD64: ${{ needs.release.outputs.sha_darwin_amd64 }}
          SHA_LINUX_AMD64: ${{ needs.release.outputs.sha_linux_amd64 }}
        run: |
          node cli/scripts/update-tap-formula.js homebrew-tap/Formula/micropage.rb

      - name: Commit and push formula update
        working-directory: homebrew-tap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/micropage.rb
          git commit -m "chore: bump micropage to v${{ needs.release.outputs.version }}"
          git push
